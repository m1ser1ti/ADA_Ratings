<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADA Ratings — Rate Your Professors</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Header search */
    .header-search-wrap {
      flex: 1;
      max-width: 500px;
      margin: 0 24px;
      position: relative;
    }
    .header-search-input {
      width: 100%;
      padding: 10px 18px 10px 42px;
      border: 1px solid var(--border);
      border-radius: 50px;
      font-size: 0.95rem;
      background: #f4f7f6;
      transition: all 0.2s;
      font-family: inherit;
      color: #333;
    }
    .header-search-input:focus {
      outline: none;
      background: #fff;
      border-color: var(--caspian-blue);
      box-shadow: 0 0 0 3px rgba(51, 97, 120, 0.1);
    }
    .header-search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      pointer-events: none;
    }

    /* Search results dropdown */
    .header-search-results {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      max-height: 400px;
      overflow-y: auto;
      display: none;
      z-index: 30;
    }
    .header-search-results.active { display: block; }

    .search-result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.15s;
      text-decoration: none;
      color: inherit;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f4f7f6; }

    .search-result-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--bg);
    }
    .search-result-info { flex: 1; min-width: 0; }
    .search-result-name {
      font-weight: 600;
      color: var(--caspian-blue);
      font-size: 0.9rem;
      margin-bottom: 2px;
    }
    .search-result-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-result-school {
      background: var(--caspian-blue);
      color: #fff;
      padding: 3px 8px;
      border-radius: 10px;
      font-size: 0.7rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    .search-empty {
      padding: 16px;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    @media (max-width: 720px) {
      .header-search-wrap { margin: 0 10px; max-width: none; }
      .brand span { display: none; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="brand">
        <img src="/ada_logo.svg" alt="ADA" class="brand-logo">
        <span>ADA Ratings</span>
      </a>

      <div class="header-search-wrap">
        <svg class="header-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input
          type="text"
          id="search-input"
          class="header-search-input"
          placeholder="Search professors..."
          autocomplete="off"
        >
        <div id="search-results" class="header-search-results"></div>
      </div>

      <a href="https://www.ada.edu.az" target="_blank" rel="noopener" class="header-link">ADA University</a>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <h1>Rate My Professor<span class="hero-accent">!</span></h1>
      <p>Share your experience. Help fellow students choose the right courses!</p>
    </div>
  </section>

  <section class="schools-section">
    <div class="container">
      <h1 class="page-title">Choose your school</h1>
      <div id="schools-grid" class="school-grid">
        <div class="loading">Loading schools…</div>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    let allProfessors = [];

    async function loadSchools() {
      try {
        const res = await fetch('/api/schools');
        if (!res.ok) throw new Error('Request failed');
        const schools = await res.json();

        const grid = document.getElementById('schools-grid');

        if (!schools.length) {
          grid.innerHTML = '<div class="error-box">No schools found. Make sure the database is seeded.</div>';
          return;
        }

        grid.innerHTML = schools.map(s => `
          <a href="school.html?code=${encodeURIComponent(s.code)}" class="school-card">
            <div class="school-code">${escapeHtml(s.code)}</div>
            <div class="school-name">${escapeHtml(s.name)}</div>
            <div class="school-meta">${s.professor_count} professor${s.professor_count === 1 ? '' : 's'}</div>
          </a>
        `).join('');
      } catch (err) {
        showError('schools-grid', 'Could not load schools. Is the server running?');
      }
    }

    async function loadAllProfessors() {
      try {
        const res = await fetch('/api/professors');
        if (!res.ok) return;
        allProfessors = await res.json();
      } catch (err) {
        console.error('Could not load professors for search', err);
      }
    }

    function setupSearch() {
      const input = document.getElementById('search-input');
      const results = document.getElementById('search-results');

      input.addEventListener('input', () => {
        const query = input.value.trim().toLowerCase();

        if (query.length < 2) {
          results.classList.remove('active');
          results.innerHTML = '';
          return;
        }

        const matches = allProfessors.filter(p =>
          p.name.toLowerCase().includes(query) ||
          (p.specialization && p.specialization.toLowerCase().includes(query))
        ).slice(0, 8);

        if (matches.length === 0) {
          results.innerHTML = '<div class="search-empty">No professors found</div>';
        } else {
          results.innerHTML = matches.map(p => `
            <a href="professor.html?id=${p.id}" class="search-result-item">
              <img
                class="search-result-photo"
                src="${escapeHtml(p.image_url || fallbackAvatar(p.name))}"
                alt="${escapeHtml(p.name)}"
                onerror="this.onerror=null;this.src='${fallbackAvatar(p.name)}'"
              >
              <div class="search-result-info">
                <div class="search-result-name">${escapeHtml(p.name)}</div>
                <div class="search-result-meta">${escapeHtml(p.title || '')} · ${escapeHtml(p.specialization || '')}</div>
              </div>
              <span class="search-result-school">${escapeHtml(p.school)}</span>
            </a>
          `).join('');
        }

        results.classList.add('active');
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.header-search-wrap')) {
          results.classList.remove('active');
        }
      });

      input.addEventListener('focus', () => {
        if (input.value.trim().length >= 2) {
          results.classList.add('active');
        }
      });
    }

    loadSchools();
    loadAllProfessors();
    setupSearch();
  </script>
</body>
</html>
