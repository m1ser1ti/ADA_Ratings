<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADA Ratings — Rate Your Professor at ADA</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="site-header-inner">
      <a href="/" class="brand">
  <img src="/ada_logo.svg" alt="ADA" class="brand-logo">
  <span>Rate My Professor</span>
</a>
      <a href="https://www.ada.edu.az" target="_blank" rel="noopener" class="header-link">ADA University</a>
    </div>
  </header>

<section class="hero">
  <div class="hero-inner">
    <h1>Rate My Professor<span class="hero-accent">!</span></h1>
    <p>Share your experience. Help fellow students choose the right courses!</p>
  </div>
</section>

<section class="schools-section">
  <main class="container">
    <h2 class="page-title">Choose your school</h2>

    <div id="schools-grid" class="school-grid">
      <div class="loading">Loading schools…</div>
    </div>
  </main>
</section>

  <script src="script.js"></script>
  <script>
    async function loadSchools() {
      const container = document.getElementById('schools-grid');
      try {
        const res = await fetch('/api/schools');
        if (!res.ok) throw new Error('Failed to load schools');
        const schools = await res.json();

        if (!schools.length) {
          container.innerHTML = '<div class="error-box">No schools found. Make sure the database is seeded.</div>';
          return;
        }

        container.innerHTML = schools.map(s => `
          <a href="school.html?code=${encodeURIComponent(s.code)}" class="school-card">
            <div class="school-code">${escapeHtml(s.code)}</div>
            <div class="school-name">${escapeHtml(s.name)}</div>
            <div class="school-meta">
              ${s.professor_count} professor${s.professor_count === 1 ? '' : 's'}
            </div>
          </a>
        `).join('');
      } catch (err) {
        showError('schools-grid', 'Could not load schools. Is the server running?');
      }
    }

    loadSchools();
  </script>
</body>
</html>
